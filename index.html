<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXSY SHOP</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05020f;--card:#0d0820;--card2:#110b28;
  --border:rgba(155,48,255,0.25);--purple:#9b30ff;
  --neon:#00f5ff;--gold:#ffd700;--text:#e8e0ff;--muted:#7a6a9a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}

/* ── WELCOME ── */
#ws{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s ease,transform .6s ease;pointer-events:none}
#ws.out{opacity:0;transform:scale(1.04)}
.wsglow{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.wsglow::before{content:'';position:absolute;top:50%;left:50%;width:500px;height:500px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(155,48,255,.35) 0%,transparent 65%);animation:pg 2.5s ease-in-out infinite}
.wsglow::after{content:'';position:absolute;top:25%;left:65%;width:260px;height:260px;background:radial-gradient(circle,rgba(0,245,255,.15) 0%,transparent 65%);animation:pg 3s ease-in-out infinite reverse}
@keyframes pg{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.18);opacity:1}}
.wshand{font-size:62px;animation:wave .9s ease-in-out infinite;transform-origin:70% 80%;filter:drop-shadow(0 0 18px rgba(255,215,0,.5));position:relative;z-index:1}
@keyframes wave{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(18deg)}}
.wstitle{font-family:'Orbitron',sans-serif;font-size:clamp(20px,6.5vw,34px);font-weight:900;text-align:center;line-height:1.3;position:relative;z-index:1;background:linear-gradient(135deg,#fff 0%,var(--neon) 45%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:su .7s ease both}
.wssub{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);position:relative;z-index:1;animation:su .7s .15s ease both}
.wsbar{width:190px;height:3px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;position:relative;z-index:1;margin-top:8px;animation:su .7s .25s ease both}
.wsbar-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--purple),var(--neon));box-shadow:0 0 8px var(--neon);animation:lb 2.3s .4s ease forwards}
@keyframes lb{to{width:100%}}
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

#app{display:none}

/* ── NAVBAR ── */
.navbar{height:62px;display:flex;justify-content:space-between;align-items:center;padding:0 16px;position:sticky;top:0;z-index:900;background:rgba(5,2,15,.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;color:var(--neon);text-shadow:0 0 12px rgba(0,245,255,.4);display:flex;align-items:center;gap:7px}
.logo b{color:var(--purple)}
.hamburger{font-size:20px;background:rgba(0,245,255,.07);border:1px solid rgba(0,245,255,.15);color:var(--neon);border-radius:10px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── SIDE MENU ── */
.sideov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.3s;z-index:2000}
.sideov.open{opacity:1;pointer-events:auto}
.sidemenu{position:fixed;right:-280px;top:0;width:260px;height:100vh;background:#09041e;border-left:1px solid var(--border);padding:24px 16px;transition:.35s cubic-bezier(.4,0,.2,1);z-index:3000;display:flex;flex-direction:column;gap:8px}
.sidemenu.open{right:0}
.sidehead{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--neon);margin-bottom:12px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sidelink{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--text);text-decoration:none;font-size:13px;font-weight:600}

/* ── BANNER ── */
.banwrap{padding:12px 12px 0}
.banwrap img,.banwrap video{width:100%;border-radius:18px;max-height:165px;object-fit:cover;display:block;border:1px solid var(--border)}

/* ── LABEL ── */
.seclabel{padding:16px 14px 8px;font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}

/* ── CATEGORIES ── */
.cats{display:flex;gap:8px;overflow-x:auto;padding:0 12px 4px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{padding:8px 18px;border-radius:99px;flex-shrink:0;background:var(--card);border:1px solid var(--border);white-space:nowrap;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:color .2s,border-color .2s,background .2s}
.cat.on{background:rgba(155,48,255,.18);border-color:var(--purple);color:#fff}
.cat:not(.on):hover{border-color:rgba(155,48,255,.5);color:var(--text)}

/* ── PRODUCT GRID ── */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 100px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.pcard:active{transform:scale(.96);box-shadow:0 0 18px rgba(155,48,255,.25)}
.pthumb{position:relative;width:100%;aspect-ratio:4/3;background:#08051a;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pthumb img{width:100%;height:100%;object-fit:contain;padding:6px;display:block;transition:transform .35s}
.pcard:hover .pthumb img{transform:scale(1.06)}
.pinb{position:absolute;top:6px;left:6px;background:linear-gradient(135deg,var(--gold),#e67e00);color:#000;font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px}
.pbody{padding:8px 10px 10px;display:flex;flex-direction:column;flex:1}
.pname{font-size:12px;font-weight:700;color:#fff;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35;min-height:2.7em}
.pprice{font-size:13px;font-weight:800;color:var(--neon);margin-bottom:7px;margin-top:auto}
.pdiv{height:1px;background:var(--border);margin-bottom:7px}
.pbtn{width:100%;padding:8px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--purple),#5200cc);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted);font-size:14px}
.empty span{font-size:38px;display:block;margin-bottom:10px}

/* ── MODALS (CENTER) ── */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:8000;padding:20px}
.mover.on{display:flex}
.msheet{background:#0d0820;border-radius:20px;padding:20px 18px 24px;width:100%;max-width:420px;border:1px solid var(--border);animation:sup .28s cubic-bezier(.4,0,.2,1);position:relative;max-height:90vh;overflow-y:auto}
@keyframes sup{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.mclose{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mtitle{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--neon);margin-bottom:12px}
.ordrow{display:flex;gap:10px;align-items:center;background:var(--card2);border-radius:12px;padding:10px;margin-bottom:12px;border:1px solid var(--border)}
.ordrow img{width:48px;height:48px;object-fit:contain;border-radius:8px;background:#07041a;padding:3px}
.ordname{font-weight:700;font-size:13px;color:#fff}
.ordprice{font-weight:800;font-size:14px;color:var(--neon);margin-top:2px}
.flabel{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:10px 0 5px}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--purple)}
.inp::placeholder{color:var(--muted)}

/* ── PAYMENT METHOD ── */
.pmethods{display:flex;gap:8px;margin-top:2px}
.pmbtn{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.pmbtn.on{background:rgba(155,48,255,.2);border-color:var(--purple);color:#fff}

/* ── PAY CONTENT ── */
.qimg{width:180px;display:block;margin:10px auto 8px;border-radius:12px;border:1px solid var(--border)}
.dlbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:12px;border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:13px;font-weight:600;margin-bottom:10px;background:rgba(255,255,255,.03)}
.pay-info-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin:8px 0;text-align:center}
.pay-info-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.pay-info-number{font-size:20px;font-weight:800;color:var(--neon);letter-spacing:1px}

/* ── UPLOAD ── */
.uplabel{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:16px;border-radius:14px;border:2px dashed var(--border);cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;background:var(--card2);margin-top:5px;transition:border-color .2s,background .2s}
.uplabel:active{border-color:var(--purple);background:rgba(155,48,255,.08)}
.uico{font-size:24px}
#proof{display:none}
#fname{font-size:11px;color:var(--neon);margin-top:3px}
.mbtn{width:100%;margin-top:12px;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--neon));color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.3px}

.copy{text-align:center;padding:28px 10px;font-family:'Orbitron',sans-serif;font-size:11px;color:var(--muted);letter-spacing:1px}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#180d32;border:1px solid var(--border);color:#fff;padding:11px 20px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9500;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="ws">
  <div class="wsglow"></div>
  <div class="wshand">👋</div>
  <div class="wstitle">Welcome to<br>VOXSY SHOP</div>
  <div class="wssub">Official Store</div>
  <div class="wsbar"><div class="wsbar-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <nav class="navbar">
    <div class="logo">🛒 VOXSY<b>SHOP</b></div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </nav>

  <div class="sideov" id="sideOv" onclick="toggleMenu()"></div>
  <div class="sidemenu" id="sideMenu">
    <div class="sidehead">🛍️ VOXSY SHOP</div>
    <a class="sidelink" id="wa" target="_blank">💬 WhatsApp Admin</a>
    <a class="sidelink" id="group" target="_blank">👥 Group Bot Community</a>
    <a class="sidelink" id="channel" target="_blank">📢 Channel Official Voxsy</a>
  </div>

  <!-- BANNER — dibuat sekali, tidak di-re-render saat ganti kategori -->
  <div class="banwrap" id="banner"></div>

  <!-- MUSIK AUTOPLAY -->
  <audio id="bgMusic" loop></audio>

  <div class="seclabel">KATEGORI</div>
  <div class="cats" id="cats"></div>

  <div class="seclabel">PRODUK</div>
  <div class="pgrid" id="products"></div>

  <div class="copy">© VOXSY X ZENITH</div>

  <!-- ORDER MODAL -->
  <div class="mover" id="orderModal">
    <div class="msheet">
      <button class="mclose" onclick="closeAll()">✕</button>
      <div class="mtitle">🛒 BUAT ORDER</div>
      <div class="ordrow">
        <img id="oImg" src="">
        <div>
          <div class="ordname" id="oName">–</div>
          <div class="ordprice" id="oPrice">–</div>
        </div>
      </div>
      <div class="flabel">Nama Kamu</div>
      <input class="inp" id="buyerName" placeholder="Masukkan nama lengkap...">
      <div class="flabel">Metode Pembayaran</div>
      <div class="pmethods">
        <button type="button" class="pmbtn on" onclick="selPay('qris',this)">💳 QRIS</button>
        <button type="button" class="pmbtn" onclick="selPay('dana',this)">💵 Dana</button>
        <button type="button" class="pmbtn" onclick="selPay('gopay',this)">💰 GoPay</button>
      </div>
      <button class="mbtn" onclick="nextPay()">Lanjut ke Pembayaran →</button>
    </div>
  </div>

  <!-- PAY MODAL -->
  <div class="mover" id="payModal">
    <div class="msheet">
      <button class="mclose" onclick="closeAll()">✕</button>
      <div class="mtitle">💳 PEMBAYARAN</div>
      <div id="payContent"></div>
      <div class="flabel">Upload Bukti Transfer</div>
      <label class="uplabel" for="proof">
        <span class="uico">📎</span>
        <span>Tap untuk pilih foto bukti</span>
        <span id="fname"></span>
      </label>
      <input type="file" id="proof" accept="image/*" onchange="setFname(this)">
      <button class="mbtn" onclick="send()">📨 Kirim ke Admin</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- WELCOME + UI SCRIPT -->
<script>
// Proteksi
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12'||(e.ctrlKey&&['u','s','a'].includes(e.key.toLowerCase()))||(e.ctrlKey&&e.shiftKey&&['i','j','c'].includes(e.key.toLowerCase())))
    e.preventDefault();
});

// Welcome hide
setTimeout(function(){
  var ws=document.getElementById('ws');
  var app=document.getElementById('app');
  ws.classList.add('out');
  app.style.display='block';
  setTimeout(function(){ws.style.display='none'},650);
},2600);

window.toggleMenu=function(){
  document.getElementById('sideMenu').classList.toggle('open');
  document.getElementById('sideOv').classList.toggle('open');
};
window.closeAll=function(){
  document.getElementById('orderModal').classList.remove('on');
  document.getElementById('payModal').classList.remove('on');
};
window._payMethod='qris';
window.selPay=function(m,btn){
  window._payMethod=m;
  document.querySelectorAll('.pmbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
};
window.nextPay=function(){
  var n=document.getElementById('buyerName');
  if(!n||!n.value.trim()){
    _showToast('⚠️ Isi nama kamu dulu!');
    return;
  }
  var s=window.__stSettings||{};
  var m=window._payMethod;
  var pc=document.getElementById('payContent');
  if(m==='qris'){
    var q=s.qrisUrl||'https://img2.pixhost.to/images/7838/725233706_elaina-1778564710301.jpg';
    pc.innerHTML='<img src="'+q+'" class="qimg"><a href="'+q+'" class="dlbtn" target="_blank" download>⬇ Download QRIS</a>';
  } else if(m==='dana'){
    var nd=s.noDana||'-';pc.innerHTML='<div class="pay-info-box"><div class="pay-info-label">💵 Nomor Dana</div><div class="pay-info-number">'+nd+'</div></div><button class="dlbtn" style="cursor:pointer;width:100%;border:none;background:none" onclick="_copyNo(this)">📋 Salin Nomor</button>';
  } else {
    var ng=s.noGopay||'-';pc.innerHTML='<div class="pay-info-box"><div class="pay-info-label">💰 Nomor GoPay</div><div class="pay-info-number">'+ng+'</div></div><button class="dlbtn" style="cursor:pointer;width:100%;border:none;background:none" onclick="_copyNo(this)">📋 Salin Nomor</button>';
  }
  document.getElementById('orderModal').classList.remove('on');
  document.getElementById('payModal').classList.add('on');
};
window.setFname=function(i){
  var f=document.getElementById('fname');
  if(f) f.innerText=i.files[0]?i.files[0].name:'';
};
window._copyNo=function(btn){var no=btn.previousElementSibling.querySelector('.pay-info-number').innerText;navigator.clipboard.writeText(no).then(function(){_showToast('✅ Nomor disalin!');btn.innerText='✅ Tersalin!';setTimeout(function(){btn.innerText='📋 Salin Nomor';},2000);}).catch(function(){_showToast('❌ Gagal salin');});};window._showToast=function(msg){
  var t=document.getElementById('toast');
  t.innerText=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on')},2800);
};
</script>

<!-- APP LOGIC -->
<script type="module">
const u1=['aHR0cHM6Ly93d3cu','Z3N0YXRpYy5jb20v','ZmlyZWJhc2Vqcy8x','MC4xMi4yL2ZpcmVi','YXNlLWFwcC5qcw=='].map(atob).join('');
const u2=['aHR0cHM6Ly93d3cu','Z3N0YXRpYy5jb20v','ZmlyZWJhc2Vqcy8x','MC4xMi4yL2ZpcmVi','YXNlLWRhdGFiYXNlLmpz'].map(atob).join('');
const{initializeApp}=await import(u1);
const{getDatabase,ref,onValue}=await import(u2);
const fa=initializeApp(window.__CFG.firebaseConfig);
const db=getDatabase(fa);
const rp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);
const g=id=>document.getElementById(id);
let st={},sel={},ac='all';
let _bannerSet=false; // flag: banner hanya diset sekali
let _musicSet=false;  // flag: musik hanya diset sekali
window.__prods=[];

onValue(ref(db,'store'),snap=>{
  st=snap.val()||{settings:{},products:{},categories:{}};
  draw();
});

function draw(){
  const s=st.settings||{};
  window.__stSettings=s;

  // Links
  g('wa').href='https://wa.me/'+(s.urlAdmin||'');
  g('group').href=s.urlGroup||'#';
  g('channel').href=s.urlChannel||'#';

  // Banner — set SEKALI saja, tidak re-render saat ganti kategori
  if(!_bannerSet){
    _bannerSet=true;
    const b=s.banner||'';
    if(b.includes('.mp4')){
      g('banner').innerHTML=`<video autoplay muted loop playsinline src="${b}"></video>`;
    } else if(b){
      g('banner').innerHTML=`<img src="${b}" onerror="this.style.display='none'">`;
    }
  }

  // Musik autoplay — set SEKALI saja
  if(!_musicSet && s.musicUrl){
    _musicSet=true;
    const mus=g('bgMusic');
    mus.src=s.musicUrl;
    mus.volume=0.35;
    // autoplay butuh interaksi user di mobile, coba langsung, fallback ke tap
    const tryPlay=()=>mus.play().catch(()=>{});
    tryPlay();
    document.addEventListener('click',tryPlay,{once:true});
    document.addEventListener('touchstart',tryPlay,{once:true});
  }

  // Kategori
  const cats=Object.values(st.categories||{});
  g('cats').innerHTML=
    `<div class="cat ${ac==='all'?'on':''}" onclick="_fc('all')">🏪 Semua</div>`
    +cats.map(c=>`<div class="cat ${ac===c.name?'on':''}" onclick="_fc('${c.name}')">${c.name}</div>`).join('');

  // Produk
  const all=Object.values(st.products||{});
  window.__prods=all;

  let grid;
  if(ac==='all'){
    // Semua = hanya yang di-pin
    grid=all.filter(x=>x.pinned);
  } else {
    const catAll=all.filter(x=>x.category===ac);
    grid=[...catAll.filter(x=>x.pinned),...catAll.filter(x=>!x.pinned)];
  }

  if(!grid.length){
    g('products').innerHTML=`<div class="empty"><span>📦</span>Belum ada produk</div>`;
    return;
  }
  g('products').innerHTML=grid.map(x=>{
    const idx=all.indexOf(x);
    return `<div class="pcard">
      <div class="pthumb">
        <img src="${x.thumbnail||''}" onerror="this.src=''">
        ${x.pinned?'<div class="pinb">⭐ PIN</div>':''}
      </div>
      <div class="pbody">
        <div class="pname">${x.name||'Produk'}</div>
        <div class="pprice">${rp(x.price||0)}</div>
        <div class="pdiv"></div>
        <button class="pbtn" onclick="_od(${idx})">🛒 Order Sekarang</button>
      </div>
    </div>`;
  }).join('');
}

window._fc=c=>{ac=c;draw()};

window._od=idx=>{
  const x=window.__prods[idx];
  if(!x)return;
  sel=x;
  g('oImg').src=x.thumbnail||'';
  g('oName').innerText=x.name||'';
  g('oPrice').innerText=rp(x.price||0);
  g('orderModal').classList.add('on');
};

window.send=async()=>{
  const file=g('proof').files[0];
  if(!file){_showToast('⚠️ Pilih bukti transfer dulu!');return}
  _showToast('⏳ Mengupload...');
  try{
    const fd=new FormData();fd.append('image',file);
    const ep=[atob('aHR0cHM6Ly9hcGku'),atob('aW1nYmIuY29tLzEv'),atob('dXBsb2Fk')].join('');
    const res=await fetch(`${ep}?key=${window.__CFG.IMGBB_KEY}`,{method:'POST',body:fd});
    const j=await res.json();
    if(!j?.data?.url){_showToast('❌ Upload gagal, coba lagi');return}
    const nm=g('buyerName').value||'-';
    const m=window._payMethod||'qris';
    const ml=m==='qris'?'QRIS':m==='dana'?'Dana':'GoPay';
    const msg=encodeURIComponent(
`*📝 FORMAT ORDER PRODUK*

*👤 Nama* : ${nm}
*🛒 Produk* : ${sel.name}
*💰 Harga* : ${rp(sel.price)}
*💳 Metode Bayar* : ${ml}
*📸 Bukti pembayaran*
${j.data.url}

💌 Mohon diproses ya admin 😘`);
    window.open('https://wa.me/'+(st.settings?.urlAdmin||'')+'?text='+msg);
    closeAll();
    _showToast('✅ Order terkirim!');
  }catch(e){_showToast('❌ '+e.message)}
};
</script>
</body>
</html>
